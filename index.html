<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>计数器</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
}

/* ===== 顶部 ===== */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  height: 60px;
  background: #fff;
  border-bottom: 1px solid #eee;

  position: relative;
}

/* 左提示 */
.left-text {
  font-size: 12px;
  color: #888;
}

/* 中间按钮组 */
.center-group {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Reset */
.reset-btn {
  padding: 10px 20px;
  font-size: 15px;
  font-weight: bold;
  color: white;
  background: linear-gradient(135deg, #00d5ff);
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.reset-btn:hover {
  transform: scale(1.05);
}

.reset-btn:active {
  transform: scale(0.95);
}

/* Undo */
.undo-btn {
  font-size: 24px;
  border: none;
  background: none;
  cursor: pointer;
  color: #0077ff;
}

.undo-btn:hover {
  transform: scale(1.2);
}

/* 右菜单 */
.menu-btn {
  font-size: 22px;
  border: none;
  background: none;
  cursor: pointer;
}

/* ===== 卡片 ===== */
.item {
  display: inline-block;
  margin: 10px;
}

img {
  width: 120px;
  cursor: pointer;
}

.ghost {
  opacity: 0;
  pointer-events: none;
}

.count {
  font-size: 18px;
}

/* ===== 统计 ===== */
#stats {
  margin-top: 20px;
  font-size: 14px;
  color: #aaa;

  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
}

.stat-item {
  color: #999;
  transition: color 0.2s;
}

.stat-item.active {
  color: #000;
}

/* ===== 菜单 ===== */
.menu {
  background: white;
  border-radius: 10px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  padding: 8px;
  z-index: 9999;
  min-width: 300px;

  position: absolute;
  top: 60px;
  right: 10px;   /* ⭐固定右上角 */
  display: none;
}

#resetMenu {
  position: fixed;
  display: none;

  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);

  z-index: 99999;

  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.25);

  padding: 12px;

  width: 700px;
  max-width: 95vw;
}

.menu-grid {
  display: flex;
  gap: 10px;
}

.menu-left,
.menu-right {
  flex: 1;
  max-height: 70vh;
  overflow: hidden; /* 不滚动 */
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.menu-left {
  border-right: 1px solid #eee;
}

.menu-item {
  padding: 6px;
  cursor: pointer;
  border-radius: 6px;
  font-size: 14px;
  background: #f8f8f8;
}

.menu-item:hover {
  background: #eee;
}

#noteToggle {
  position: fixed;
  bottom: 20px;
  left: 20px;

  width: 40px;
  height: 40px;

  background: #00d5ff;
  color: white;
  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  font-size: 18px;
  z-index: 99999;

  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* 面板默认隐藏 */
#noteToggle {
  position: fixed;
  bottom: 20px;
  left: 20px;

  width: 42px;
  height: 42px;

  background: #00d5ff;
  color: white;
  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  z-index: 99999;
}

/* ⭐竖向安全浮窗（不会挡中间） */
#noteBox {
  position: fixed;
  bottom: 20px;
  left: 20px;

  width: 260px;
  height: 320px;

  background: rgba(255,255,255,0.95);
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);

  display: none;
  flex-direction: column;

  z-index: 999999; /* ⭐关键 */
}

.note-header {
  flex-shrink: 0;
  background: #00d5ff;
  padding: 5px;
  border-bottom: 1px solid #eee;

  display: flex;          /* ⭐关键 */
  align-items: center;   /* ⭐垂直居中 */
  gap: 6px;              /* ⭐按钮间距 */

  border-radius: 2px;
}

.note-header button {
  border: none;
  background: #ffffff;
  color: #333;

  width: 32px;
  height: 32px;

  border-radius: 10px;   /* ⭐变圆润 */
  cursor: pointer;
}

.note-header button.active {
  background: #0073ff;
  color: white;
}

/* 顶部 */
#noteTop {
  display: flex;
  align-items: center;
  gap: 6px;

  padding: 8px;
  background: #00d5ff;
  color: white;
}

#noteTop span {
  font-size: 13px;
  font-weight: bold;
}

/* 输入框 */
#noteInput {
  flex: 1;
  border: none;
  outline: none;
  padding: 4px;
  border-radius: 4px;

  background-color: #aaeaf7;
  opacity: 0.5;
}

/* 记录区 */
#noteList {
  flex: 2;
  padding: 8px;
  overflow-y: auto;

  font-size: 13px;
  line-height: 1.4;
  
}

#clearNoteBtn {
  margin-left: auto;

  border: none;
  background: white;  /* 红色危险按钮 */
  color: black;

  width: 28px;
  height: 28px;

  border-radius: 6px;
  cursor: pointer;
}

#clearNoteBtn:hover {
  background:blue;
}
#clearNoteBtn:hover {
  background: rgba(255,255,255,0.4);
}

/* ⭐提示容器 */
#toastContainer {
  position: fixed;
  bottom: 20px;   /* ⭐从上改成下 */
  right: 20px;

  display: flex;
  flex-direction: column;
  gap: 8px;

  z-index: 999999;
}

/* ⭐单个提示 */
.toast {
  min-width: 160px;
  padding: 8px 12px;

  border-radius: 8px;
  font-size: 13px;

  background: rgba(183, 181, 181, 0.35); /* ⭐半透明黑 */
  color: rgb(0, 0, 0);

  backdrop-filter: blur(4px);

  opacity: 0;
  transform: translateY(20px);

  animation: slideUp 0.25s forwards, fadeOut 0.3s 2.5s forwards;
}

/* 不同类型微微颜色 */
.toast-good { border-left: 3px solid #4caf50; }
.toast-bad  { border-left: 3px solid #ff6b6b; }
.toast-warn { border-left: 3px solid #ffb300; }

@keyframes slideUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeOut {
  to {
    opacity: 0;
    transform: translateX(50px);
  }
}

#resetMenu {
  display: none;
}

</style>
</head>

<body>

<!-- 顶部 -->
<div class="top-bar">

  <div class="left-text">
    点击+1 | 右键-1 | 长按输入 | 右键重置
  </div>

  <div class="center-group">
    <button class="reset-btn" onclick="resetAll()">Reset</button>
    <button class="undo-btn" onclick="undo()">↩</button>
  </div>

  <button class="menu-btn">☰</button>

</div>

<!-- 内容 -->
<div id="container"></div>
<div id="stats"></div>

<!-- 菜单 -->
<div id="mainMenu" class="menu">
  <div class="menu-item" onclick="switchMode('normal')">普通图鉴</div>
  <div class="menu-item" onclick="switchMode('shiny')">✨ 异色图鉴</div>
  <div class="menu-item" onclick="toggleNote()">📝 记事本</div>
</div>

<div id="noteToggle" onclick="toggleNote()">📝</div>

<div id="noteBox">

  <div class="note-header">
    <button onclick="switchNoteMode('player')">✎</button>
    <button onclick="switchNoteMode('system')">✉</button>

    <button onclick="clearNotes()" id="clearNoteBtn">♻︎</button>
  </div>

  <div id="noteList"></div>

  <input id="noteInput" placeholder="输入记录..." />

</div>


<div id="resetMenu" class="menu">
  <div style="font-weight:bold; margin-bottom:8px;">重置菜单</div>

  <div class="menu-grid">
    <div id="typeList" class="menu-left"></div>
    <div id="nameList" class="menu-right"></div>
  </div>
</div>

<div id="toastContainer"></div>

<script src="script.js?v=1"></script>

</body>
</html>
