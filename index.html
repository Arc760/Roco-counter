<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>计数器</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
}

/* ===== 顶部 ===== */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  height: 60px;
  background: #fff;
  border-bottom: 1px solid #eee;

  position: relative;
}

/* 左提示 */
.left-text {
  font-size: 12px;
  color: #888;
}

/* 中间按钮组 */
.center-group {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Reset */
.reset-btn {
  padding: 10px 20px;
  font-size: 15px;
  font-weight: bold;
  color: white;
  background: linear-gradient(135deg, #00d5ff);
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.reset-btn:hover {
  transform: scale(1.05);
}

.reset-btn:active {
  transform: scale(0.95);
}

/* Undo */
.undo-btn {
  font-size: 24px;
  border: none;
  background: none;
  cursor: pointer;
  color: #0077ff;
}

.undo-btn:hover {
  transform: scale(1.2);
}

/* 右菜单 */
.menu-btn {
  font-size: 22px;
  border: none;
  background: none;
  cursor: pointer;
}

/* ===== 卡片 ===== */
.item {
  display: inline-block;
  margin: 10px;
}

img {
  width: 120px;
  cursor: pointer;
}

.ghost {
  opacity: 0;
  pointer-events: none;
}

.count {
  font-size: 18px;
}

/* ===== 统计 ===== */
#stats {
  margin-top: 20px;
  font-size: 14px;
  color: #aaa;

  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
}

.stat-item {
  color: #999;
  transition: color 0.2s;
}

.stat-item.active {
  color: #000;
}

/* ===== 菜单 ===== */
.menu {
  background: white;
  border-radius: 10px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  padding: 8px;
  z-index: 9999;
  min-width: 300px;

  position: absolute;
  top: 60px;
  right: 10px;   /* ⭐固定右上角 */
  display: none;
}

#resetMenu {
  position: fixed;
  display: none;

  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);

  z-index: 99999;

  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.25);

  padding: 12px;

  width: 700px;
  max-width: 95vw;
}

.menu-grid {
  display: flex;
  gap: 10px;
}

.menu-left,
.menu-right {
  flex: 1;
  max-height: 70vh;
  overflow: hidden; /* 不滚动 */
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.menu-left {
  border-right: 1px solid #eee;
}

.menu-item {
  padding: 6px;
  cursor: pointer;
  border-radius: 6px;
  font-size: 14px;
  background: #f8f8f8;
}

.menu-item:hover {
  background: #eee;
}

#noteToggle {
  position: fixed;
  bottom: 20px;
  left: 20px;

  width: 40px;
  height: 40px;

  background: #00d5ff;
  color: white;
  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  font-size: 18px;
  z-index: 99999;

  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* 面板默认隐藏 */
#noteToggle {
  position: fixed;
  bottom: 20px;
  left: 20px;

  width: 42px;
  height: 42px;

  background: #00d5ff;
  color: white;
  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  z-index: 99999;
}

/* ⭐竖向安全浮窗（不会挡中间） */
#noteBox {
  position: fixed;
  bottom: 70px;
  left: 20px;

  width: 260px;
  height: 320px;

  background: white;
  border-radius: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);

  display: none;
  flex-direction: column;

  z-index: 99999;
  overflow: hidden;
}

/* 顶部 */
#noteTop {
  display: flex;
  align-items: center;
  gap: 6px;

  padding: 8px;
  background: #00d5ff;
  color: white;
}

#noteTop span {
  font-size: 13px;
  font-weight: bold;
}

/* 输入框 */
#noteInput {
  flex: 1;
  border: none;
  outline: none;
  padding: 6px;
  border-radius: 6px;
}

/* 清空按钮 */
#clearNoteBtn {
  border: none;
  background: rgba(255,255,255,0.25);
  color: white;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  cursor: pointer;
}

/* 记录区 */
#noteList {
  flex: 1;
  padding: 8px;
  overflow-y: auto;

  font-size: 13px;
  line-height: 1.4;
}


#clearNoteBtn:hover {
  background: rgba(255,255,255,0.35);
}
</style>
</head>

<body>

<!-- 顶部 -->
<div class="top-bar">

  <div class="left-text">
    点击+1 | 右键-1 | 长按输入 | 右键重置
  </div>

  <div class="center-group">
    <button class="reset-btn" onclick="resetAll()">Reset</button>
    <button class="undo-btn" onclick="undo()">⮪</button>
  </div>

  <button class="menu-btn">☰</button>

</div>

<!-- 内容 -->
<div id="container"></div>
<div id="stats"></div>

<!-- 菜单 -->
<div id="mainMenu" class="menu">
  <div class="menu-item" onclick="switchMode('normal')">普通图鉴</div>
  <div class="menu-item" onclick="switchMode('shiny')">✨ 异色图鉴</div>
  <div class="menu-item" onclick="toggleNote()">📝 记事本</div>
</div>

<div id="noteToggle" onclick="toggleNote()">
  📝
</div>

<div id="noteToggle" onclick="toggleNote()">📝</div>

<div id="noteBox">
  <div id="noteTop">
    <span>📝 </span>
    <input id="noteInput" placeholder="输入事件，回车记录..." />
    <button onclick="clearNotes()">🗑</button>
  </div>

  <div id="noteList"></div>
</div>

<div id="resetMenu" class="menu">
  <div style="font-weight:bold; margin-bottom:8px;">重置菜单</div>

  <div class="menu-grid">
    <div id="typeList" class="menu-left"></div>
    <div id="nameList" class="menu-right"></div>
  </div>
</div>

<script src="script.js?v=1"></script>

</body>
</html>
